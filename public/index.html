<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>xhs-media-toolkit 演示页</title>
    <style>
      :root {
        --ink: #231f20;
        --muted: #706a66;
        --paper: #fff8ec;
        --card: #fffdf8;
        --line: #eadfce;
        --accent: #d84b2a;
        --accent-dark: #9f2f1d;
        --green: #246b4b;
        --shadow: 0 18px 50px rgb(70 45 20 / 14%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
        background:
          radial-gradient(circle at 15% 15%, rgb(216 75 42 / 14%), transparent 30rem),
          radial-gradient(circle at 85% 20%, rgb(36 107 75 / 12%), transparent 26rem),
          linear-gradient(135deg, #fff8ec 0%, #f3eadb 100%);
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0 56px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        margin-bottom: 26px;
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        padding: 7px 11px;
        border: 1px solid rgb(216 75 42 / 28%);
        border-radius: 999px;
        color: var(--accent-dark);
        background: rgb(255 253 248 / 70%);
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: clamp(34px, 6vw, 72px);
        line-height: 0.94;
        letter-spacing: -0.055em;
      }

      .intro {
        max-width: 720px;
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.65;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgb(255 253 248 / 82%);
        box-shadow: var(--shadow);
        overflow: hidden;
        backdrop-filter: blur(12px);
      }

      .form {
        display: grid;
        gap: 16px;
        padding: 24px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px 16px;
        color: var(--ink);
        background: #fffaf1;
        font:
          16px/1.4 ui-monospace,
          "SFMono-Regular",
          Consolas,
          monospace;
        outline: none;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: rgb(216 75 42 / 72%);
        box-shadow: 0 0 0 4px rgb(216 75 42 / 12%);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        color: white;
        background: var(--accent);
        font:
          700 15px/1.2 ui-sans-serif,
          system-ui,
          sans-serif;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        color: var(--ink);
        background: #efe4d1;
      }

      button.secondary:hover {
        background: #e6d6bc;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
      }

      .status {
        min-height: 24px;
        color: var(--green);
        font:
          14px/1.5 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .result-head {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 24px;
        border-top: 1px solid var(--line);
        background: rgb(239 228 209 / 50%);
      }

      .result-head.visible {
        display: flex;
      }

      .result-head strong {
        font-size: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 16px;
        padding: 24px;
      }

      .card {
        display: grid;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 12px;
        background: var(--card);
      }

      .card img,
      .card video,
      .media-fallback {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 16px;
        background: #eadfce;
      }

      .card img,
      .card video {
        object-fit: contain;
      }

      .media-fallback {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--muted);
        text-align: center;
        font:
          700 14px/1.4 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .card code {
        display: block;
        min-height: 42px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .card-actions button,
      .card-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border-radius: 999px;
        text-decoration: none;
        font:
          700 13px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .card-actions a {
        color: var(--ink);
        background: #efe4d1;
      }

      .raw {
        display: none;
        margin: 0;
        padding: 20px 24px 24px;
        border-top: 1px solid var(--line);
        color: #514b46;
        background: #fffaf1;
        overflow-x: auto;
        font:
          13px/1.55 ui-monospace,
          "SFMono-Regular",
          Consolas,
          monospace;
      }

      .raw.visible {
        display: block;
      }

      @media (max-width: 680px) {
        .shell {
          width: min(100% - 20px, 1180px);
          padding-top: 26px;
        }

        .form,
        .grid,
        .result-head {
          padding: 16px;
        }

        .result-head {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <span class="eyebrow">Worker 演示台</span>
        <h1>xhs-media-toolkit 演示页</h1>
        <p class="intro">
          输入分享文本或笔记 URL，页面会调用你的 Cloudflare Worker 的
          <code>/extract</code> 接口，再用 <code>/proxy</code> 代理预览和下载媒体，避免把当前网站的
          Referer 暴露给上游 CDN。
        </p>
      </section>

      <section class="panel">
        <form id="extractForm" class="form">
          <label>
            Worker 地址
            <input id="workerBase" value="http://127.0.0.1:8787" spellcheck="false" />
          </label>

          <label>
            分享文本或笔记 URL
            <textarea
              id="shareText"
              spellcheck="false"
              placeholder="粘贴你有权访问和保存的小红书分享文本或笔记 URL"
            ></textarea>
          </label>

          <div class="actions">
            <button id="extractButton" type="submit">提取媒体地址</button>
            <button id="copyButton" class="secondary" type="button" disabled>复制全部 URL</button>
            <button id="clearButton" class="secondary" type="button">清空结果</button>
            <span id="status" class="status"></span>
          </div>
        </form>

        <div id="resultHead" class="result-head">
          <strong id="summary">等待提取</strong>
          <span id="finalUrl"></span>
        </div>

        <div id="grid" class="grid"></div>
        <pre id="raw" class="raw"></pre>
      </section>
    </main>

    <script src="./config.js"></script>
    <script>
      const form = document.querySelector("#extractForm");
      const workerBaseInput = document.querySelector("#workerBase");
      const shareTextInput = document.querySelector("#shareText");
      const extractButton = document.querySelector("#extractButton");
      const copyButton = document.querySelector("#copyButton");
      const clearButton = document.querySelector("#clearButton");
      const statusEl = document.querySelector("#status");
      const resultHead = document.querySelector("#resultHead");
      const summaryEl = document.querySelector("#summary");
      const finalUrlEl = document.querySelector("#finalUrl");
      const grid = document.querySelector("#grid");
      const raw = document.querySelector("#raw");

      let lastUrls = [];

      applyRuntimeConfig();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await extractUrls();
      });

      copyButton.addEventListener("click", async () => {
        if (!lastUrls.length) return;
        try {
          await navigator.clipboard.writeText(lastUrls.join("\n"));
          setStatus(`已复制 ${lastUrls.length} 个地址`);
        } catch {
          setStatus("复制失败，请手动复制下方 JSON 中的 urls 字段", true);
        }
      });

      clearButton.addEventListener("click", () => {
        lastUrls = [];
        grid.innerHTML = "";
        raw.textContent = "";
        raw.classList.remove("visible");
        resultHead.classList.remove("visible");
        copyButton.disabled = true;
        setStatus("结果已清空");
      });

      async function extractUrls() {
        const workerBase = normalizeBaseUrl(workerBaseInput.value);
        const shareText = shareTextInput.value.trim();

        if (!workerBase || !shareText) {
          setStatus("请先填写 Worker 地址和分享文本", true);
          return;
        }

        setBusy(true);
        setStatus("正在请求 Worker...");

        try {
          const response = await fetch(`${workerBase}/extract`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ shareText }),
          });

          const data = await readJsonResponse(response);
          if (!response.ok) {
            throw new Error(data.error || `HTTP ${response.status}`);
          }

          lastUrls = Array.isArray(data.urls) ? data.urls : [];
          renderResult(data, workerBase);
          setStatus(`完成，提取到 ${lastUrls.length} 个资源`);
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        } finally {
          setBusy(false);
        }
      }

      function renderResult(data, workerBase) {
        grid.innerHTML = "";
        copyButton.disabled = lastUrls.length === 0;
        resultHead.classList.add("visible");
        summaryEl.textContent = `提取到 ${lastUrls.length} 个资源`;
        finalUrlEl.textContent = data.finalNoteUrl || "";
        raw.textContent = JSON.stringify(data, null, 2);
        raw.classList.add("visible");

        const items =
          Array.isArray(data.mediaItems) && data.mediaItems.length
            ? data.mediaItems
            : lastUrls.map((url, index) => ({ url, type: "image", index }));

        for (const [index, item] of items.entries()) {
          const proxiedUrl = `${workerBase}/proxy?u=${encodeURIComponent(item.url)}`;
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            ${renderMediaPreview(item, proxiedUrl, index)}
            <code>${escapeHtml(item.url)}</code>
            <div class="card-actions">
              <a href="${escapeAttr(proxiedUrl)}" target="_blank" rel="noreferrer">打开</a>
              <button type="button">下载</button>
            </div>
          `;

          card.querySelector("button").addEventListener("click", () => {
            const extension = item.filenameExtension || item.format || "bin";
            void downloadViaWorker(
              proxiedUrl,
              `xhs-${String(index + 1).padStart(2, "0")}.${extension}`,
            );
          });

          grid.appendChild(card);
        }
      }

      function renderMediaPreview(item, proxiedUrl, index) {
        if (item.type === "video" || item.type === "livePhotoVideo") {
          return `
            <video
              src="${escapeAttr(proxiedUrl)}"
              controls
              preload="metadata"
              playsinline
            ></video>
          `;
        }

        if (item.type === "image") {
          return `<img src="${escapeAttr(proxiedUrl)}" referrerpolicy="no-referrer" alt="资源 ${index + 1}" />`;
        }

        return `<div class="media-fallback">资源 ${index + 1}</div>`;
      }

      async function downloadViaWorker(proxiedUrl, filename) {
        try {
          setStatus(`正在下载 ${filename}...`);
          const response = await fetch(proxiedUrl);
          if (!response.ok) {
            setStatus(`下载失败：HTTP ${response.status}`, true);
            return;
          }

          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = objectUrl;
          anchor.download = filename;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(objectUrl);
          setStatus(`已触发下载 ${anchor.download}`);
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        }
      }

      async function readJsonResponse(response) {
        try {
          return await response.json();
        } catch {
          return {
            error: `Worker 返回了非 JSON 响应：HTTP ${response.status}`,
          };
        }
      }

      function normalizeBaseUrl(value) {
        return value.trim().replace(/\/+$/, "");
      }

      function applyRuntimeConfig() {
        const config = window.XHS_MEDIA_TOOLKIT_CONFIG || {};
        const configuredWorkerBase = normalizeBaseUrl(config.workerBaseUrl || "");
        if (configuredWorkerBase) {
          workerBaseInput.value = configuredWorkerBase;
        }
      }

      function setBusy(isBusy) {
        extractButton.disabled = isBusy;
        extractButton.textContent = isBusy ? "提取中..." : "提取媒体地址";
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#a13025" : "var(--green)";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
