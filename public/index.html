<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    />
    <meta
      name="keywords"
      content="小红书原图提取,小红书视频提取,小红书无水印,xhs-media-toolkit,Cloudflare Worker"
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="xhs-media-toolkit" />
    <meta property="og:title" content="xhs-media-toolkit | 小红书原图与视频资源提取工具" />
    <meta
      property="og:description"
      content="从小红书公开页面提取无水印原图和视频资源，支持 Cloudflare Worker、CLI 和受限媒体代理。"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="xhs-media-toolkit | 小红书原图与视频资源提取工具" />
    <meta
      name="twitter:description"
      content="从小红书公开页面提取无水印原图和视频资源，支持 Cloudflare Worker、CLI 和受限媒体代理。"
    />
    <title>xhs-media-toolkit | 小红书原图与视频资源提取工具</title>
    <style>
      :root {
        --bg: #10130f;
        --bg-soft: #171d16;
        --panel: rgb(250 246 229 / 92%);
        --panel-deep: #e8dec5;
        --ink: #171a14;
        --muted: #68705f;
        --line: rgb(23 26 20 / 14%);
        --cream: #fff8dc;
        --gold: #f0b84f;
        --leaf: #89aa5d;
        --red: #d95135;
        --red-dark: #9c3425;
        --cyan: #9bd9c7;
        --shadow: 0 30px 90px rgb(0 0 0 / 36%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--cream);
        font-family:
          "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, "Noto Serif SC", serif;
        background:
          radial-gradient(circle at 12% 12%, rgb(240 184 79 / 24%), transparent 28rem),
          radial-gradient(circle at 78% 10%, rgb(137 170 93 / 22%), transparent 30rem),
          radial-gradient(circle at 78% 82%, rgb(217 81 53 / 18%), transparent 32rem),
          linear-gradient(135deg, #0d130f 0%, #182013 48%, #241611 100%);
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgb(255 255 255 / 4%) 1px, transparent 1px),
          linear-gradient(90deg, rgb(255 255 255 / 4%) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(to bottom, black, transparent 78%);
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .shell {
        width: min(1220px, calc(100% - 32px));
        margin: 0 auto;
        padding: 34px 0 52px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 42px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--cream);
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid rgb(255 248 220 / 22%);
        border-radius: 15px;
        color: #18120f;
        background: linear-gradient(135deg, var(--gold), #f7df93);
        box-shadow: 0 18px 50px rgb(240 184 79 / 18%);
        font:
          900 20px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .brand-text {
        display: grid;
        gap: 2px;
        font:
          700 15px/1.1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .brand-text small {
        color: rgb(255 248 220 / 58%);
        font-weight: 500;
      }

      .nav-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .nav-links a,
      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 8px 12px;
        border: 1px solid rgb(255 248 220 / 16%);
        border-radius: 999px;
        color: rgb(255 248 220 / 78%);
        background: rgb(255 248 220 / 7%);
        text-decoration: none;
        font:
          700 13px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 0.86fr) minmax(420px, 1fr);
        gap: 26px;
        align-items: start;
      }

      .copy {
        display: grid;
        gap: 22px;
        padding-top: 18px;
      }

      .eyebrow {
        width: fit-content;
        color: var(--cyan);
        font:
          800 12px/1 ui-sans-serif,
          system-ui,
          sans-serif;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 600px;
        margin: 0;
        color: #fff9e7;
        font-size: clamp(34px, 4.1vw, 54px);
        line-height: 1.04;
        letter-spacing: -0.045em;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        max-width: 650px;
      }

      .stat {
        min-height: 112px;
        padding: 16px;
        border: 1px solid rgb(255 248 220 / 14%);
        border-radius: 24px;
        background: rgb(255 248 220 / 7%);
        backdrop-filter: blur(16px);
      }

      .stat strong {
        display: block;
        margin-bottom: 10px;
        color: var(--gold);
        font:
          900 24px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .stat span {
        color: rgb(255 248 220 / 68%);
        font:
          700 13px/1.45 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .notice {
        max-width: 650px;
        padding: 16px 18px;
        border: 1px solid rgb(155 217 199 / 22%);
        border-radius: 22px;
        color: rgb(255 248 220 / 72%);
        background: rgb(155 217 199 / 8%);
        font:
          600 14px/1.7 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .console {
        overflow: hidden;
        border: 1px solid rgb(255 248 220 / 24%);
        border-radius: 34px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .console-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 18px;
        color: var(--ink);
        background: linear-gradient(135deg, #f8ecc8, #e5d6b7);
        font:
          800 13px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .lights {
        display: flex;
        gap: 8px;
      }

      .lights span {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }

      .lights span:nth-child(1) {
        background: #d95135;
      }

      .lights span:nth-child(2) {
        background: #f0b84f;
      }

      .lights span:nth-child(3) {
        background: #89aa5d;
      }

      .form {
        display: grid;
        gap: 16px;
        padding: 22px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--muted);
        font:
          800 13px/1.2 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 15px 16px;
        color: var(--ink);
        background: #fffaf0;
        outline: none;
        font:
          15px/1.55 "SFMono-Regular",
          Consolas,
          ui-monospace,
          monospace;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      input:focus,
      textarea:focus {
        border-color: rgb(217 81 53 / 72%);
        box-shadow: 0 0 0 4px rgb(217 81 53 / 12%);
      }

      .actions {
        display: grid;
        grid-template-columns: 1.4fr 1fr 1fr;
        gap: 10px;
      }

      button {
        min-height: 46px;
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        color: #fff8dc;
        background: linear-gradient(135deg, var(--red), var(--red-dark));
        cursor: pointer;
        font:
          900 14px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      button:hover {
        filter: brightness(1.04);
        transform: translateY(-1px);
      }

      button.secondary {
        color: var(--ink);
        background: #e8dec5;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.54;
        transform: none;
      }

      .status {
        min-height: 24px;
        color: #2f6c4b;
        font:
          700 14px/1.5 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .result-head {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 18px 22px;
        border-top: 1px solid var(--line);
        color: var(--ink);
        background: rgb(232 222 197 / 62%);
      }

      .result-head.visible {
        display: flex;
      }

      .result-head strong {
        font:
          900 20px/1.2 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      #finalUrl {
        max-width: 54%;
        color: var(--muted);
        overflow-wrap: anywhere;
        font:
          700 12px/1.45 ui-monospace,
          monospace;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 14px;
        padding: 22px;
      }

      .card {
        display: grid;
        gap: 10px;
        border: 1px solid var(--line);
        border-radius: 24px;
        padding: 12px;
        color: var(--ink);
        background: #fffaf0;
      }

      .card img,
      .card video,
      .media-fallback {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 18px;
        background: linear-gradient(135deg, rgb(23 26 20 / 8%), rgb(217 81 53 / 10%)), #eee3cc;
      }

      .card img,
      .card video {
        object-fit: contain;
      }

      .media-fallback {
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--muted);
        text-align: center;
        font:
          900 14px/1.4 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .card code {
        display: block;
        min-height: 44px;
        color: var(--muted);
        font:
          12px/1.45 ui-monospace,
          monospace;
        overflow-wrap: anywhere;
      }

      .card-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .card-actions button,
      .card-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        border-radius: 999px;
        text-decoration: none;
        font:
          900 13px/1 ui-sans-serif,
          system-ui,
          sans-serif;
      }

      .card-actions a {
        color: var(--ink);
        background: #e8dec5;
      }

      .raw {
        display: none;
        margin: 0;
        max-height: 380px;
        padding: 20px 22px 24px;
        border-top: 1px solid var(--line);
        color: #464b3d;
        background: #fffaf0;
        overflow: auto;
        font:
          12px/1.6 ui-monospace,
          monospace;
      }

      .raw.visible {
        display: block;
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .copy {
          padding-top: 0;
        }
      }

      @media (max-width: 680px) {
        .shell {
          width: min(100% - 20px, 1220px);
          padding-top: 20px;
        }

        .nav {
          align-items: flex-start;
          flex-direction: column;
          margin-bottom: 30px;
        }

        .stats,
        .actions {
          grid-template-columns: 1fr;
        }

        .form,
        .grid,
        .result-head {
          padding: 16px;
        }

        .result-head {
          align-items: flex-start;
          flex-direction: column;
        }

        #finalUrl {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "xhs-media-toolkit",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Cloudflare Workers, Node.js",
        "description": "用于从小红书公开页面提取无水印原图和视频资源的开源工具，支持 Cloudflare Worker、CLI 和受限媒体代理。",
        "codeRepository": "https://github.com/sunlightcold/xhs-media-toolkit",
        "license": "https://github.com/sunlightcold/xhs-media-toolkit/blob/main/LICENSE"
      }
    </script>
    <main class="shell">
      <nav class="nav" aria-label="页面导航">
        <a class="brand" href="https://github.com/sunlightcold/xhs-media-toolkit" rel="noreferrer">
          <span class="brand-mark">X</span>
          <span class="brand-text">
            xhs-media-toolkit
            <small>Cloudflare Worker Media Console</small>
          </span>
        </a>
        <div class="nav-links">
          <a href="https://github.com/sunlightcold/xhs-media-toolkit" rel="noreferrer">GitHub</a>
          <span class="chip">公开页面元数据</span>
        </div>
      </nav>

      <section class="hero">
        <div class="copy">
          <span class="eyebrow">public media metadata extractor</span>
          <h1>提取小红书公开页面里的原图与视频资源。</h1>

          <div class="stats" aria-label="能力概览">
            <div class="stat">
              <strong>01</strong>
              <span>提取无水印原图与视频资源地址</span>
            </div>
            <div class="stat">
              <strong>02</strong>
              <span>只代理允许的小红书媒体域名</span>
            </div>
            <div class="stat">
              <strong>03</strong>
              <span>不处理登录、验证码或私有内容</span>
            </div>
          </div>

          <div class="notice">
            安全边界：本工具只读取公开页面响应里的媒体元数据。请只用于你有权访问和保存的内容。
          </div>
        </div>

        <section class="console" aria-label="媒体提取表单">
          <div class="console-bar">
            <div class="lights" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span>Worker 操作台</span>
          </div>

          <form id="extractForm" class="form">
            <label>
              Worker 地址
              <input id="workerBase" value="http://127.0.0.1:8787" spellcheck="false" />
            </label>

            <label>
              分享文本或笔记 URL
              <textarea
                id="shareText"
                spellcheck="false"
                placeholder="粘贴你有权访问和保存的小红书分享文本或笔记 URL"
              ></textarea>
            </label>

            <div class="actions">
              <button id="extractButton" type="submit">提取媒体地址</button>
              <button id="copyButton" class="secondary" type="button" disabled>复制全部 URL</button>
              <button id="clearButton" class="secondary" type="button">清空结果</button>
            </div>
            <span id="status" class="status"></span>
          </form>

          <div id="resultHead" class="result-head">
            <strong id="summary">等待提取</strong>
            <span id="finalUrl"></span>
          </div>

          <div id="grid" class="grid"></div>
          <pre id="raw" class="raw"></pre>
        </section>
      </section>
    </main>

    <script src="./config.js"></script>
    <script>
      const form = document.querySelector("#extractForm");
      const workerBaseInput = document.querySelector("#workerBase");
      const shareTextInput = document.querySelector("#shareText");
      const extractButton = document.querySelector("#extractButton");
      const copyButton = document.querySelector("#copyButton");
      const clearButton = document.querySelector("#clearButton");
      const statusEl = document.querySelector("#status");
      const resultHead = document.querySelector("#resultHead");
      const summaryEl = document.querySelector("#summary");
      const finalUrlEl = document.querySelector("#finalUrl");
      const grid = document.querySelector("#grid");
      const raw = document.querySelector("#raw");

      let lastUrls = [];

      applyRuntimeConfig();

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        await extractUrls();
      });

      copyButton.addEventListener("click", async () => {
        if (!lastUrls.length) return;
        try {
          await navigator.clipboard.writeText(lastUrls.join("\n"));
          setStatus(`已复制 ${lastUrls.length} 个地址`);
        } catch {
          setStatus("复制失败，请手动复制下方 JSON 中的 urls 字段", true);
        }
      });

      clearButton.addEventListener("click", () => {
        lastUrls = [];
        grid.innerHTML = "";
        raw.textContent = "";
        raw.classList.remove("visible");
        resultHead.classList.remove("visible");
        copyButton.disabled = true;
        setStatus("结果已清空");
      });

      async function extractUrls() {
        const workerBase = normalizeBaseUrl(workerBaseInput.value);
        const shareText = shareTextInput.value.trim();

        if (!workerBase || !shareText) {
          setStatus("请先填写 Worker 地址和分享文本", true);
          return;
        }

        setBusy(true);
        setStatus("正在请求 Worker...");

        try {
          const response = await fetch(`${workerBase}/extract`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ shareText }),
          });

          const data = await readJsonResponse(response);
          if (!response.ok) {
            throw new Error(data.error || `HTTP ${response.status}`);
          }

          lastUrls = Array.isArray(data.urls) ? data.urls : [];
          renderResult(data, workerBase);
          setStatus(`完成，提取到 ${lastUrls.length} 个资源`);
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        } finally {
          setBusy(false);
        }
      }

      function renderResult(data, workerBase) {
        grid.innerHTML = "";
        copyButton.disabled = lastUrls.length === 0;
        resultHead.classList.add("visible");
        summaryEl.textContent = `提取到 ${lastUrls.length} 个资源`;
        finalUrlEl.textContent = data.finalNoteUrl || "";
        raw.textContent = JSON.stringify(data, null, 2);
        raw.classList.add("visible");

        const items =
          Array.isArray(data.mediaItems) && data.mediaItems.length
            ? data.mediaItems
            : lastUrls.map((url, index) => ({ url, type: "image", index }));

        for (const [index, item] of items.entries()) {
          const proxiedUrl = `${workerBase}/proxy?u=${encodeURIComponent(item.url)}`;
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            ${renderMediaPreview(item, proxiedUrl, index)}
            <code>${escapeHtml(item.url)}</code>
            <div class="card-actions">
              <a href="${escapeAttr(proxiedUrl)}" target="_blank" rel="noreferrer">打开</a>
              <button type="button">下载</button>
            </div>
          `;

          card.querySelector("button").addEventListener("click", () => {
            const extension = item.filenameExtension || item.format || "bin";
            void downloadViaWorker(
              proxiedUrl,
              `xhs-${String(index + 1).padStart(2, "0")}.${extension}`,
            );
          });

          grid.appendChild(card);
        }
      }

      function renderMediaPreview(item, proxiedUrl, index) {
        if (item.type === "video" || item.type === "livePhotoVideo") {
          return `
            <video
              src="${escapeAttr(proxiedUrl)}"
              controls
              preload="metadata"
              playsinline
            ></video>
          `;
        }

        if (item.type === "image") {
          return `<img src="${escapeAttr(proxiedUrl)}" referrerpolicy="no-referrer" alt="资源 ${index + 1}" />`;
        }

        return `<div class="media-fallback">资源 ${index + 1}</div>`;
      }

      async function downloadViaWorker(proxiedUrl, filename) {
        try {
          setStatus(`正在下载 ${filename}...`);
          const response = await fetch(proxiedUrl);
          if (!response.ok) {
            setStatus(`下载失败：HTTP ${response.status}`, true);
            return;
          }

          const blob = await response.blob();
          const objectUrl = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = objectUrl;
          anchor.download = filename;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(objectUrl);
          setStatus(`已触发下载 ${anchor.download}`);
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), true);
        }
      }

      async function readJsonResponse(response) {
        try {
          return await response.json();
        } catch {
          return {
            error: `Worker 返回了非 JSON 响应：HTTP ${response.status}`,
          };
        }
      }

      function normalizeBaseUrl(value) {
        return value.trim().replace(/\/+$/, "");
      }

      function applyRuntimeConfig() {
        const config = window.XHS_MEDIA_TOOLKIT_CONFIG || {};
        const configuredWorkerBase = normalizeBaseUrl(config.workerBaseUrl || "");
        if (configuredWorkerBase) {
          workerBaseInput.value = configuredWorkerBase;
        }
      }

      function setBusy(isBusy) {
        extractButton.disabled = isBusy;
        extractButton.textContent = isBusy ? "提取中..." : "提取媒体地址";
      }

      function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.style.color = isError ? "#9c3425" : "#2f6c4b";
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    </script>
  </body>
</html>
